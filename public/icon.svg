<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Rounded square with modern blue gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="calendarGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1e3a8a" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Subtle overlay gradient for depth -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)" opacity="0.1"/>

  <!-- Calendar shadow -->
  <rect x="106" y="110" width="300" height="320" rx="24" fill="#1e3a8a" opacity="0.2" filter="url(#shadow)"/>

  <!-- Calendar body -->
  <rect x="100" y="100" width="300" height="320" rx="24" fill="url(#calendarGradient)"/>

  <!-- Calendar header -->
  <path d="M100 124C100 110.745 110.745 100 124 100H376C389.255 100 400 110.745 400 124V160H100V124Z" fill="#2563eb"/>

  <!-- Calendar header circles (date indicators) -->
  <circle cx="160" cy="130" r="12" fill="#60a5fa" opacity="0.8"/>
  <circle cx="200" cy="130" r="12" fill="#60a5fa" opacity="0.6"/>
  <circle cx="240" cy="130" r="12" fill="#60a5fa" opacity="0.4"/>
  <circle cx="280" cy="130" r="12" fill="#60a5fa" opacity="0.6"/>
  <circle cx="320" cy="130" r="12" fill="#60a5fa" opacity="0.8"/>

  <!-- Calendar rings/binding holes -->
  <circle cx="140" cy="100" r="14" fill="#1e40af"/>
  <circle cx="360" cy="100" r="14" fill="#1e40af"/>
  <circle cx="140" cy="100" r="8" fill="#1e3a8a"/>
  <circle cx="360" cy="100" r="8" fill="#1e3a8a"/>

  <!-- Large "26" number - modern bold typography -->
  <text x="250" y="290" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="bold" fill="#1e40af" text-anchor="middle">26</text>

  <!-- Year label text -->
  <text x="250" y="340" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="600" fill="#3b82f6" text-anchor="middle" letter-spacing="4">TAHUN</text>

  <!-- Working days indicator - checkmark badge -->
  <g transform="translate(330, 300)">
    <circle cx="0" cy="0" r="32" fill="#22c55e"/>
    <path d="M-12 2 L-4 10 L12 -8" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="140" y="370" width="220" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>
</svg>
